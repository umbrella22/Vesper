name: Vesper Mobile Hosts CI

on:
  pull_request:
    paths:
      - ".github/workflows/mobile-hosts-ci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/**"
      - "crates/core/**"
      - "crates/audio/**"
      - "crates/render/**"
      - "crates/backend/**"
      - "crates/extension/**"
      - "crates/platform/common/**"
      - "crates/platform/mobile/**"
      - "crates/platform/jni/**"
      - "lib/android/**"
      - "lib/ios/VesperPlayerKit/**"
      - "examples/android-compose-host/**"
      - "examples/ios-swift-host/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/mobile-hosts-ci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/**"
      - "crates/core/**"
      - "crates/audio/**"
      - "crates/render/**"
      - "crates/backend/**"
      - "crates/extension/**"
      - "crates/platform/common/**"
      - "crates/platform/mobile/**"
      - "crates/platform/jni/**"
      - "lib/android/**"
      - "lib/ios/VesperPlayerKit/**"
      - "examples/android-compose-host/**"
      - "examples/ios-swift-host/**"
  workflow_dispatch:

concurrency:
  group: mobile-hosts-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-host:
    name: Vesper Android Host Demo ${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi:
          - arm64-v8a

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cbindgen
        run: cargo install cbindgen --locked

      - name: Verify generated FFI header
        run: ./scripts/verify-player-ffi-header.sh

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve Android SDK root
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-$ANDROID_HOME}" >> "$GITHUB_ENV"

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.14206865"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Android FFmpeg prebuilts
        run: bash ./scripts/build-android-ffmpeg-prebuilts.sh ${{ matrix.abi }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.0"

      - name: Write Android local.properties
        run: |
          cat <<EOF > examples/android-compose-host/local.properties
          sdk.dir=${ANDROID_SDK_ROOT}
          EOF

      - name: Check Android bridge crates
        run: cargo check -p player-platform-android -p player-jni-android

      - name: Build Android JNI libraries
        run: ./scripts/build-android-vesper-player-kit-jni.sh release ${{ matrix.abi }}

      - name: Verify Android host kits do not bundle player-remux-ffmpeg by default
        run: bash ./scripts/verify-mobile-host-kit-without-player-remux-ffmpeg.sh android

      - name: Run Android host regression tests
        run: examples/android-compose-host/gradlew -p examples/android-compose-host -Pvesper.player.android.abis=${{ matrix.abi }} :app:testDebugUnitTest

      - name: Assemble Vesper Android host demo release
        run: examples/android-compose-host/gradlew -p examples/android-compose-host -Pvesper.player.android.abis=${{ matrix.abi }} assembleRelease

      - name: Stage Vesper Android release APK
        if: github.event_name == 'workflow_dispatch'
        run: |
          shopt -s nullglob
          apk_files=(examples/android-compose-host/app/build/outputs/apk/release/*.apk)
          if [[ ${#apk_files[@]} -ne 1 ]]; then
            echo "Expected exactly one release APK, found ${#apk_files[@]}." >&2
            printf '%s\n' "${apk_files[@]}" >&2
            exit 1
          fi

          mkdir -p artifacts/android
          cp "${apk_files[0]}" "artifacts/android/VesperPlayerHostDemo-${{ matrix.abi }}-release.apk"

      - name: Upload Vesper Android release APK
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: VesperPlayerHostDemo-android-${{ matrix.abi }}-release-apk
          path: artifacts/android/*.apk

  ios-host:
    name: Vesper iOS Host Demo arm64
    runs-on: macos-latest
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select Xcode 26.3
        run: xcodebuild -version

      - name: Build Apple FFmpeg prebuilts
        run: ./scripts/build-apple-ffmpeg-prebuilts.sh ios-arm64 ios-simulator-arm64

      - name: Build iOS player-remux-ffmpeg plugin libraries
        run: ./scripts/build-ios-player-remux-ffmpeg-plugin.sh /tmp/vesper-ios-player-remux-ffmpeg release ios-arm64 ios-simulator-arm64

      - name: Check iOS Rust adapter crate
        run: cargo check -p player-platform-ios

      - name: Build Rust iOS resolver bundle
        run: ./scripts/build-ios-player-ffi-xcframework.sh release

      - name: Verify iOS host kit does not bundle player-remux-ffmpeg by default
        run: bash ./scripts/verify-mobile-host-kit-without-player-remux-ffmpeg.sh ios

      - name: Generate Xcode project
        working-directory: examples/ios-swift-host
        run: xcodegen generate

      - name: Generate VesperPlayerKit Xcode project
        working-directory: lib/ios/VesperPlayerKit
        run: xcodegen generate

      - name: Refresh Rust iOS resolver bundle for Swift package resolution
        run: ./scripts/build-ios-player-ffi-xcframework.sh release

      - name: Run VesperPlayerKit iOS regression tests
        run: |
          xcodebuild \
            -project lib/ios/VesperPlayerKit/VesperPlayerKit.xcodeproj \
            -scheme VesperPlayerKit \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 17,OS=latest" \
            -derivedDataPath lib/ios/VesperPlayerKit/build/TestDerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            test

      - name: Run Vesper iOS host regression tests
        run: |
          xcodebuild \
            -project examples/ios-swift-host/VesperPlayerHostDemo.xcodeproj \
            -scheme VesperPlayerHostDemo \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 17,OS=latest" \
            -derivedDataPath examples/ios-swift-host/build/TestDerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            test

      - name: Build Vesper iOS host demo release
        run: |
          xcodebuild \
            -project examples/ios-swift-host/VesperPlayerHostDemo.xcodeproj \
            -scheme VesperPlayerHostDemo \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath examples/ios-swift-host/build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Upload Vesper iOS release app
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: VesperPlayerHostDemo-ios-arm64-release-app
          path: examples/ios-swift-host/build/DerivedData/Build/Products/Release-iphoneos/*.app
