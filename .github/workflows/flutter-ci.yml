name: Vesper Flutter CI

on:
  pull_request:
    paths:
      - ".github/workflows/flutter-ci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/build-android-vesper-player-kit-jni.sh"
      - "scripts/build-android-player-ffmpeg-plugin.sh"
      - "scripts/build-android-ffmpeg-prebuilts.sh"
      - "scripts/build-apple-ffmpeg-prebuilts.sh"
      - "scripts/build-ios-player-ffmpeg-plugin.sh"
      - "crates/core/**"
      - "crates/audio/**"
      - "crates/render/**"
      - "crates/backend/**"
      - "crates/platform/common/**"
      - "crates/platform/mobile/**"
      - "crates/platform/jni/**"
      - "lib/android/vesper-player-kit/**"
      - "lib/ios/VesperPlayerKit/**"
      - "lib/flutter/**"
      - "examples/flutter-host/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/flutter-ci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/build-android-vesper-player-kit-jni.sh"
      - "scripts/build-android-player-ffmpeg-plugin.sh"
      - "scripts/build-android-ffmpeg-prebuilts.sh"
      - "scripts/build-apple-ffmpeg-prebuilts.sh"
      - "scripts/build-ios-player-ffmpeg-plugin.sh"
      - "crates/core/**"
      - "crates/audio/**"
      - "crates/render/**"
      - "crates/backend/**"
      - "crates/platform/common/**"
      - "crates/platform/mobile/**"
      - "crates/platform/jni/**"
      - "lib/android/vesper-player-kit/**"
      - "lib/ios/VesperPlayerKit/**"
      - "lib/flutter/**"
      - "examples/flutter-host/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-quality:
    name: Flutter Analyze and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install Flutter dependencies
        working-directory: examples/flutter-host
        run: flutter pub get

      - name: Analyze Flutter host
        working-directory: examples/flutter-host
        run: flutter analyze

      - name: Test Flutter host
        working-directory: examples/flutter-host
        run: flutter test

  flutter-android:
    name: Flutter Android Host ${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            rust_target: aarch64-linux-android
            flutter_target: android-arm64
          - abi: x86_64
            rust_target: x86_64-linux-android
            flutter_target: android-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve Android SDK root
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-$ANDROID_HOME}" >> "$GITHUB_ENV"

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.14206865"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Android FFmpeg prebuilts
        run: bash ./scripts/build-android-ffmpeg-prebuilts.sh ${{ matrix.abi }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.0"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Write Android local.properties
        run: |
          cat <<EOF > examples/flutter-host/android/local.properties
          sdk.dir=${ANDROID_SDK_ROOT}
          flutter.sdk=${FLUTTER_ROOT}
          EOF

      - name: Write Flutter Android gradle.properties
        run: |
          cat <<EOF > examples/flutter-host/android/gradle.properties
          org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
          android.useAndroidX=true
          vesper.player.android.abis=${{ matrix.abi }}
          vesper.player.android.app.abis=${{ matrix.abi }}
          EOF

      - name: Check Android bridge crates
        run: cargo check -p player-platform-android -p player-jni-android

      - name: Install Flutter dependencies
        working-directory: examples/flutter-host
        run: flutter pub get

      - name: Build Flutter Android host release
        working-directory: examples/flutter-host
        run: flutter build apk --release --target-platform ${{ matrix.flutter_target }}

      - name: Stage Flutter Android release APK
        if: github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p artifacts/flutter-android
          cp \
            examples/flutter-host/build/app/outputs/flutter-apk/app-release.apk \
            artifacts/flutter-android/flutter-host-${{ matrix.abi }}-release.apk

      - name: Upload Flutter Android release APK
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-host-android-${{ matrix.abi }}-release-apk
          path: artifacts/flutter-android/*.apk

  flutter-ios:
    name: Flutter iOS Host arm64
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: Select Xcode 26.3
        run: xcodebuild -version

      - name: Show Flutter version
        run: flutter --version

      - name: Enable Swift Package Manager
        run: |
          flutter config --enable-swift-package-manager
          flutter config

      - name: Install Flutter dependencies
        working-directory: examples/flutter-host
        run: flutter pub get

      - name: Build Flutter iOS host release
        working-directory: examples/flutter-host
        run: flutter build ios --release --no-codesign

      - name: Upload Flutter iOS release app
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-host-ios-arm64-release-app
          path: examples/flutter-host/build/ios/iphoneos/Runner.app
