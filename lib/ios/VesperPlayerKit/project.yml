name: VesperPlayerKit
options:
  bundleIdPrefix: io.github.ikaros.vesper.lib
targets:
  VesperPlayerKit:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/VesperPlayerKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.ikaros.vesper.lib.ioshost
        DEFINES_MODULE: true
        SKIP_INSTALL: false
        BUILD_LIBRARY_FOR_DISTRIBUTION: true
    info:
      path: Sources/Generated-Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: "$(PRODUCT_NAME)"
        CFBundlePackageType: FMWK
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
