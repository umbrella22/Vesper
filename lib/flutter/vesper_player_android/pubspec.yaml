name: vesper_player_android
description: Android federated implementation for Vesper Player Flutter plugin.
version: 0.1.0
homepage: https://github.com/ikaros/rust-player-sdk
publish_to: none

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  vesper_player_platform_interface:
    path: ../vesper_player_platform_interface

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    implements: vesper_player
    platforms:
      android:
        package: io.github.ikaros.vesper.player.flutter.android
        pluginClass: VesperPlayerAndroidPlugin
        dartPluginClass: VesperPlayerAndroid
